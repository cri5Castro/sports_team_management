<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0f172a"/>
  
  <!-- Pride Top Border -->
  <defs>
    <linearGradient id="prideGradient" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E40303"/>
      <stop offset="0.1" stop-color="#FF8C00"/>
      <stop offset="0.2" stop-color="#FFED00"/>
      <stop offset="0.3" stop-color="#008026"/>
      <stop offset="0.4" stop-color="#24408E"/>
      <stop offset="0.5" stop-color="#9D4EDD"/>
      <stop offset="0.6" stop-color="#5BCEFA"/>
      <stop offset="0.7" stop-color="#FF3366"/>
      <stop offset="0.8" stop-color="#FFFFFF"/>
      <stop offset="0.9" stop-color="#613915"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    
    <filter id="glass" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <rect width="1200" height="6" fill="url(#prideGradient)"/>

  <!-- Subtle glow backgrounds -->
  <circle cx="1100" cy="100" r="150" fill="#24408E" fill-opacity="0.15" filter="url(#glass)"/>
  <circle cx="100" cy="300" r="120" fill="#9D4EDD" fill-opacity="0.15" filter="url(#glass)"/>

  <!-- Centered Content -->
  <g transform="translate(600, 200)">
    <!-- Logo Container -->
    <circle cx="0" cy="-45" r="50" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    
    <!-- Shark Fin Logo -->
    <g transform="translate(-25, -75) scale(2.2)">
      <path d="M10 2C10 2 12 10 19 14C19 14 11 15 5 21C5 21 7 12 10 2Z" fill="white"/>
    </g>
    
    <!-- Title -->
    <text x="0" y="65" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="84" letter-spacing="-0.04em">Sharkes</text>
    <text x="0" y="105" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="20" letter-spacing="0.4em">MEXICO CITY • SPORTS COMMUNITY</text>
  </g>
  
  <!-- Decorative accents -->
  <rect x="500" y="320" width="200" height="1" fill="white" fill-opacity="0.1"/>
</svg>
